name: ghostfolio
services:
  ghostfolio:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ghostfolio
    restart: unless-stopped
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env
    ports:
      - 3333:3333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3333/api/v1/health']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: docker.io/library/postgres:15-alpine
    container_name: gf-postgres
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_READ_SEARCH
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -d "$${POSTGRES_DB}" -U $${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres:/var/lib/postgresql/data

  redis:
    image: docker.io/library/redis:alpine
    container_name: gf-redis
    restart: unless-stopped
    user: '999:1000'
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env
    command:
      - /bin/sh
      - -c
      - redis-server --requirepass "$${REDIS_PASSWORD:?REDIS_PASSWORD variable is not set}"
    healthcheck:
      test:
        ['CMD-SHELL', 'redis-cli --pass "$${REDIS_PASSWORD}" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5

  chrysantha-sync:
    build:
      context: ../tools/akshare-sync
      dockerfile: Dockerfile
    container_name: chrysantha-sync
    restart: unless-stopped
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env
    depends_on:
      ghostfolio:
        condition: service_healthy
    volumes:
      - chrysantha-sync-logs:/var/log

  trading-bridge:
    build:
      context: ../tools/trading-bridge
      dockerfile: Dockerfile
    container_name: trading-bridge
    restart: unless-stopped
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - ../.env
    environment:
      # LLM configuration (override in .env if needed)
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - DEEP_THINK_MODEL=${DEEP_THINK_MODEL:-gpt-5.4}
      - QUICK_THINK_MODEL=${QUICK_THINK_MODEL:-gpt-5.4-mini}
      - BACKEND_URL=${BACKEND_URL:-}
      - OUTPUT_LANGUAGE=${OUTPUT_LANGUAGE:-Chinese}
      # Chrysantha API
      - GHOSTFOLIO_BASE_URL=${GHOSTFOLIO_BASE_URL:-http://ghostfolio:3333/api/v1}
      - GHOSTFOLIO_ACCESS_TOKEN=${GHOSTFOLIO_ACCESS_TOKEN}
    ports:
      - "8000:8000"
    depends_on:
      ghostfolio:
        condition: service_healthy
    volumes:
      # Mount TradingAgents source from host (fork: chrysantha-TradingAgents)
      - ${TRADINGAGENTS_HOST_PATH:-../../TradingAgents}:/app/TradingAgents:ro

volumes:
  postgres:
  chrysantha-sync-logs:
